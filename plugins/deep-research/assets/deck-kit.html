<!DOCTYPE html>
<html lang="en">
<!--
  ============================================================
  DECK-KIT  —  frozen design language for deep-research decks
  ============================================================
  This file IS the design. Do NOT edit the <style> block, the
  fonts, the colors, the chrome, or the component functions.
  The deck-builder agent fills ONE thing: the `slides` array.

  HOW TO USE
  ----------
  Every slide is `slides.push(<Component> props)`. Pick any
  component below, any number of slides, any order. The look is
  identical run to run because the components are fixed; only
  the content you pass changes.

  Slide numbering and the foot line are automatic — do not pass
  a slide number. The cover takes no number.

  COMPONENTS (see commented examples at the bottom):
    Cover        — title slide. Once, first.
    BulletSlide  — kicker + headline + bullet list. The workhorse.
    MetricSlide  — a 4-up metric band, then bullets.
    TwoColSlide  — two titled panels side by side.
    TableSlide   — a 3-column table, optional verdict line.
    CiteSlide    — dense citation grid. Use 1+ at the very end.

  CONTENT RULES (the 10-item Deck Quality Bar still applies):
    - Bullets: pass `grade` for the evidence grade chip. Use
      gradeType:'neutral' for company-stated / soft grades.
    - Headlines state a fact or an open question — never a
      characterization. No evaluative adjectives.
    - `verdict` is for a single load-bearing sentence, not a
      conclusion the reader should have drawn themselves.
  ============================================================
-->
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{DECK_TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ===== FROZEN — do not edit ===== */
  :root {
    --ink: #1c1d22;
    --ink-soft: #4a4c54;
    --ink-faint: #82858f;
    --paper: #f4f2ec;
    --card: #ffffff;
    --rule: #d4d1c6;
    --accent: #8a2a2a;
    --accent-soft: #f0e3e0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #2a2a2c;
    font-family: 'Spline Sans', sans-serif;
    color: var(--ink);
    overflow: hidden;
  }
  #root { height: 100vh; width: 100vw; }
  .stage { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }
  .slide {
    background: var(--paper);
    width: 100%; max-width: 1280px;
    height: 100%; max-height: 720px;
    position: relative;
    display: flex; flex-direction: column;
    padding: 52px 64px 56px;
    overflow: hidden;
  }
  .slide-num {
    position: absolute; top: 30px; right: 64px;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 11px; letter-spacing: 0.12em; color: var(--ink-faint);
  }
  .kicker {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 14px;
  }
  .headline {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 31px; line-height: 1.18; letter-spacing: -0.01em;
    color: var(--ink); max-width: 1000px;
  }
  .headline.small { font-size: 26px; }
  .toprule { height: 2px; background: var(--ink); width: 38px; margin: 18px 0 20px; }
  .body { flex: 1; display: flex; flex-direction: column; }
  .bullets { display: flex; flex-direction: column; gap: 13px; margin-top: 4px; }
  .bullet {
    display: grid; grid-template-columns: 16px 1fr; gap: 14px; align-items: start;
    font-size: 15px; line-height: 1.5; color: var(--ink-soft);
  }
  .bullet .mark { color: var(--accent); font-family: 'Spline Sans Mono', monospace; font-size: 13px; margin-top: 2px; }
  .bullet b { color: var(--ink); font-weight: 600; }
  .grade {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-soft);
    padding: 1px 6px; border-radius: 2px; white-space: nowrap;
  }
  .grade.neutral { color: var(--ink-faint); background: #e7e5dd; }
  .foot {
    margin-top: auto; padding-top: 16px; border-top: 1px solid var(--rule);
    font-size: 12px; color: var(--ink-faint);
    display: flex; justify-content: space-between;
    font-family: 'Spline Sans Mono', monospace; letter-spacing: 0.04em;
  }
  .cover { justify-content: space-between; padding: 64px; }
  .cover-top { font-family: 'Spline Sans Mono', monospace; font-size: 12px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; }
  .cover-title { font-family: 'Fraunces', serif; font-weight: 500; font-size: 62px; line-height: 1.06; letter-spacing: -0.02em; }
  .cover-sub { font-size: 17px; color: var(--ink-soft); margin-top: 22px; max-width: 620px; line-height: 1.5; }
  .cover-meta { display: flex; gap: 48px; font-family: 'Spline Sans Mono', monospace; font-size: 12px; color: var(--ink-faint); letter-spacing: 0.06em; }
  .cover-meta .lbl { display: block; color: var(--accent); margin-bottom: 5px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; flex: 1; }
  .col h4, .panel h4 {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink); margin-bottom: 14px; padding-bottom: 7px; border-bottom: 1px solid var(--rule);
  }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin: 6px 0 22px; }
  .metric { border-left: 2px solid var(--accent); padding-left: 13px; }
  .metric .val { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 500; line-height: 1; }
  .metric .lab { font-size: 12px; color: var(--ink-faint); margin-top: 7px; line-height: 1.35; }
  .panel { background: var(--card); border: 1px solid var(--rule); padding: 20px 22px; }
  .panel.accent { border-left: 3px solid var(--accent); }
  .verdict { background: var(--ink); color: var(--paper); padding: 16px 22px; font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
  .verdict b { color: #fff; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th {
    text-align: left; font-family: 'Spline Sans Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint); padding: 8px 12px 8px 0; border-bottom: 1.5px solid var(--ink);
  }
  td { padding: 9px 12px 9px 0; border-bottom: 1px solid var(--rule); color: var(--ink-soft); vertical-align: top; }
  td b { color: var(--ink); font-weight: 600; }
  .cite-slide { padding: 44px 56px 48px; }
  .cite-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 34px; }
  .cite-block h4 {
    font-family: 'Spline Sans Mono', monospace; font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
  }
  .cite-row { font-size: 10.4px; line-height: 1.4; color: var(--ink-soft); padding: 5px 0; border-bottom: 1px solid var(--rule); }
  .cite-row .claim { color: var(--ink); font-weight: 600; }
  .cite-row .src { font-family: 'Spline Sans Mono', monospace; color: var(--ink-faint); font-size: 9.4px; }
  .progress { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); transition: width 0.2s ease; }
  .hint { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); font-family: 'Spline Sans Mono', monospace; font-size: 10px; color: #6f6f72; letter-spacing: 0.1em; }
  /* print — every slide, one per page, 16:9 landscape */
  @page { size: 1280px 720px; margin: 0; }
  @media print {
    body { background: #fff; overflow: visible; }
    .hint, .progress { display: none; }
    .print-page { width: 1280px; height: 720px; overflow: hidden; page-break-after: always; break-after: page; }
    .print-page:last-child { page-break-after: auto; break-after: auto; }
    .print-page .slide { max-width: none; max-height: none; box-shadow: none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div class="hint">USE ARROW KEYS</div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, createElement: h } = React;

/* ===== FROZEN COMPONENT KIT — do not edit ===== */

/* deck-wide config — the agent sets these strings */
const DECK = {
  footLeft: '{{FOOT_LEFT}}',   /* e.g. "SAP Fioneer — Technology Analysis" */
};

/* --- primitives --- */
function Bullet(props) {
  const { children, grade, gradeType } = props;
  return h('div', { className: 'bullet' },
    h('span', { className: 'mark' }, '—'),
    h('div', null, children, grade && h('span', { className: 'grade ' + (gradeType || ''), style: { marginLeft: 7 } }, grade))
  );
}
function Bullets(items) {
  /* items: array of {text, grade, gradeType} OR raw React nodes */
  return h('div', { className: 'bullets' },
    items.map((it, k) =>
      it && it.text !== undefined
        ? h(Bullet, { key: k, grade: it.grade, gradeType: it.gradeType }, it.text)
        : h(Bullet, { key: k }, it)
    )
  );
}
function Foot(right) {
  return h('div', { className: 'foot' }, h('span', null, DECK.footLeft), h('span', null, right || ''));
}
function Head(num, kicker, headline, small) {
  return [
    num != null && h('div', { className: 'slide-num', key: 'n' }, String(num).padStart(2, '0')),
    h('div', { className: 'kicker', key: 'k' }, kicker),
    h('div', { className: 'headline' + (small ? ' small' : ''), key: 'h' }, headline),
    h('div', { className: 'toprule', key: 'r' }),
  ];
}

/* --- slide layouts --- each returns a (num) => vnode factory --- */

/* Cover(props) — props: {top, title, titleAccent, sub, meta:[{lbl,val}]} */
function Cover(p) {
  return () => h('div', { className: 'slide cover' },
    h('div', null, h('div', { className: 'cover-top' }, p.top)),
    h('div', null,
      h('div', { className: 'cover-title' }, p.title),
      p.titleAccent && h('div', { className: 'cover-title', style: { color: 'var(--accent)' } }, p.titleAccent),
      p.sub && h('div', { className: 'cover-sub' }, p.sub)
    ),
    h('div', { className: 'cover-meta' },
      (p.meta || []).map((m, k) => h('div', { key: k }, h('span', { className: 'lbl' }, m.lbl), m.val))
    )
  );
}

/* BulletSlide(props) — props: {kicker, headline, small, verdict, bullets:[...], foot} */
function BulletSlide(p) {
  return (num) => h('div', { className: 'slide' },
    Head(num, p.kicker, p.headline, p.small),
    h('div', { className: 'body' },
      p.verdict && h('div', { className: 'verdict' }, p.verdict),
      Bullets(p.bullets || [])
    ),
    Foot(p.foot)
  );
}

/* MetricSlide(props) — props: {kicker, headline, small, metrics:[{val,lab}], bullets, foot} */
function MetricSlide(p) {
  return (num) => h('div', { className: 'slide' },
    Head(num, p.kicker, p.headline, p.small),
    h('div', { className: 'body' },
      h('div', { className: 'metrics' },
        (p.metrics || []).map((m, k) => h('div', { className: 'metric', key: k },
          h('div', { className: 'val' }, m.val), h('div', { className: 'lab' }, m.lab)))),
      Bullets(p.bullets || [])
    ),
    Foot(p.foot)
  );
}

/* TwoColSlide(props) — props: {kicker, headline, small, left:{title,bullets}, right:{title,bullets,accent}, verdict, foot} */
function TwoColSlide(p) {
  const panel = (c) => h('div', { className: 'panel' + (c.accent ? ' accent' : '') },
    h('h4', null, c.title), Bullets(c.bullets || []));
  return (num) => h('div', { className: 'slide' },
    Head(num, p.kicker, p.headline, p.small),
    h('div', { className: 'body' },
      h('div', { className: 'cols' }, panel(p.left), panel(p.right)),
      p.verdict && h('div', { className: 'verdict', style: { marginTop: 18, marginBottom: 0 } }, p.verdict)
    ),
    Foot(p.foot)
  );
}

/* TableSlide(props) — props: {kicker, headline, small, cols:[..3], rows:[[..3]], verdict, bullets, foot} */
function TableSlide(p) {
  return (num) => h('div', { className: 'slide' },
    Head(num, p.kicker, p.headline, p.small),
    h('div', { className: 'body' },
      h('table', null,
        h('thead', null, h('tr', null, (p.cols || []).map((c, k) => h('th', { key: k }, c)))),
        h('tbody', null, (p.rows || []).map((r, k) =>
          h('tr', { key: k }, r.map((cell, j) => h('td', { key: j }, cell)))))
      ),
      p.bullets && h('div', { style: { marginTop: 18 } }, Bullets(p.bullets)),
      p.verdict && h('div', { className: 'verdict', style: { marginTop: 18, marginBottom: 0 } }, p.verdict)
    ),
    Foot(p.foot)
  );
}

/* CiteSlide(props) — props: {kicker, blocks:[{title, rows:[{claim,src}]}]} */
function CiteSlide(p) {
  return (num) => h('div', { className: 'slide cite-slide' },
    h('div', { className: 'slide-num' }, String(num).padStart(2, '0')),
    h('div', { className: 'kicker' }, p.kicker),
    h('div', { className: 'headline', style: { fontSize: 21, marginBottom: 14 } }, 'Citation catalog'),
    h('div', { className: 'body' },
      h('div', { className: 'cite-grid' },
        (p.blocks || []).map((b, k) => h('div', { className: 'cite-block', key: k },
          h('h4', null, b.title),
          (b.rows || []).map((row, j) => h('div', { className: 'cite-row', key: j },
            h('span', { className: 'claim' }, row.claim + ' '),
            h('span', { className: 'src' }, row.src)))
        ))
      )
    )
  );
}

/* helper: bold run inside a string of bullet text */
function b(text) { return h('b', null, text); }

/* ============================================================
   SLIDES — the agent fills this array. Everything above is frozen.
   ============================================================ */
const slides = [];

/* ----- USAGE EXAMPLES (delete when filling) -----

slides.push(Cover({
  top: 'Technology Analysis — Confidential',
  title: 'Subject Name',
  titleAccent: 'Technology Diligence',
  sub: 'One or two sentences framing what this document is.',
  meta: [
    { lbl: 'Subject', val: 'Legal entity' },
    { lbl: 'Scope',   val: 'Tech / architecture / AI' },
    { lbl: 'Basis',   val: 'N-round sourced research' },
    { lbl: 'Date',    val: 'Month YYYY' },
  ],
}));

slides.push(MetricSlide({
  kicker: 'Executive Summary',
  headline: 'A factual headline — a finding or an open question, no adjectives.',
  metrics: [
    { val: '~X', lab: 'What it is (grade in the label if soft)' },
  ],
  bullets: [
    { text: [b('Lead-in: '), 'claim text.'], grade: 'estimate' },
    { text: [b('Soft claim: '), 'text.'], grade: 'company-stated', gradeType: 'neutral' },
    'A bullet with no grade is also fine.',
  ],
  foot: 'Summary',
}));

slides.push(BulletSlide({
  kicker: 'Finding 1 — Topic',
  headline: 'The factual headline for this finding.',
  verdict: ['A single load-bearing sentence — ', b('the part that matters'), '.'],
  bullets: [
    { text: [b('Point: '), 'evidence.'], grade: 'data-room only' },
  ],
  foot: 'Topic - 1 of 3',
}));

slides.push(TwoColSlide({
  kicker: 'Finding 2 — Topic',
  headline: 'Two readings, both evidenced.',
  small: true,
  left:  { title: 'Reading A — evidence', bullets: [ {text:'...'} ] },
  right: { title: 'Reading B — evidence', accent: true, bullets: [ {text:'...'} ] },
  verdict: 'Optional net-read sentence.',
  foot: 'Topic - 2 of 3',
}));

slides.push(TableSlide({
  kicker: 'Finding 3 — Topic',
  headline: 'When a comparison is the clearest form.',
  cols: ['Column A', 'Column B', 'Column C'],
  rows: [
    [ b('Row label'), 'cell', 'cell' ],
  ],
  verdict: 'Optional sentence under the table.',
  foot: 'Topic',
}));

slides.push(CiteSlide({
  kicker: 'Sources - 1 of N - Topics covered',
  blocks: [
    { title: 'Block heading', rows: [
      { claim: 'The sourced claim, stated plainly.', src: 'Named source, date.' },
    ]},
  ],
}));

   ----- END EXAMPLES ----- */

/* ===== FROZEN runtime — do not edit ===== */
/* render one slide factory at index k — cover (0 args) takes no number */
function renderSlide(k) {
  const factory = slides[k];
  return factory.length === 0 ? factory() : factory(k);
}
function Deck() {
  const [i, setI] = useState(0);
  const [printing, setPrinting] = useState(false);
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') setI(p => Math.min(p + 1, slides.length - 1));
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') setI(p => Math.max(p - 1, 0));
      if (e.key === 'Home') setI(0);
      if (e.key === 'End') setI(slides.length - 1);
    };
    const before = () => setPrinting(true);
    const after = () => setPrinting(false);
    window.addEventListener('keydown', onKey);
    window.addEventListener('beforeprint', before);
    window.addEventListener('afterprint', after);
    return () => {
      window.removeEventListener('keydown', onKey);
      window.removeEventListener('beforeprint', before);
      window.removeEventListener('afterprint', after);
    };
  }, []);
  /* print: stack every slide, one per page. screen: one slide at a time. */
  if (printing) {
    return h('div', { className: 'print-deck' },
      slides.map((_, k) => h('div', { className: 'print-page', key: k }, renderSlide(k)))
    );
  }
  return h('div', { className: 'stage' },
    renderSlide(i),
    h('div', { className: 'progress', style: { width: ((i + 1) / slides.length * 100) + '%' } })
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(Deck));
</script>
</body>
</html>
